<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="index.title">Fractal Tree Studio</title>
    <meta
      name="description"
      content="Grow your own fractal tree — play with depth, angles, colors and randomness on an interactive canvas."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌳</text></svg>"
    />
    <script>
      // Apply the theme before first paint to avoid a flash. Kept inline and
      // duplicated on both pages on purpose; the app logic lives in theme.ts.
      (function () {
        var stored = localStorage.getItem('ftree-theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link href="/src/assets/styles.css" rel="stylesheet" />
  </head>
  <body>
    <header class="site-header">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-2 px-4 py-3 sm:px-6">
        <a href="./index.html" class="text-strong flex items-center gap-2 text-base font-bold">
          <span class="text-xl">🌳</span>
          <span class="hidden sm:inline">Fractal Tree Studio</span>
        </a>
        <div class="flex items-center gap-2">
          <nav class="flex items-center gap-1">
            <a href="./index.html" class="nav-link nav-link-active" data-i18n="nav.generator"
              >Generator</a
            >
            <a href="./learn.html" class="nav-link" data-i18n="nav.learn">Learn</a>
          </nav>
          <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle theme">
            ☀️
          </button>
          <div class="lang-switch" role="group" aria-label="Language">
            <button id="lang-en" class="lang-btn" type="button">EN</button>
            <button id="lang-es" class="lang-btn" type="button">ES</button>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 sm:px-6">
      <div class="mb-8">
        <h1
          class="text-strong text-3xl font-bold tracking-tight sm:text-4xl"
          data-i18n-html="hero.title"
        >
          Grow your own <span class="text-accent">fractal tree</span>
        </h1>
        <p class="text-muted mt-2 max-w-2xl" data-i18n-html="hero.body">
          Every tree here is drawn from one simple rule, repeated over and over. Tune the sliders,
          hit <span class="text-strong font-semibold">Generate</span>, and watch a unique tree
          appear. New here?
          <a href="./learn.html" class="text-accent font-medium underline-offset-4 hover:underline"
            >See how fractals work →</a
          >
        </p>
      </div>

      <div class="grid gap-6 lg:grid-cols-[minmax(0,1fr)_340px]">
        <section class="card flex items-center p-4 sm:p-5" aria-label="Fractal canvas">
          <canvas
            id="fractalCanvas"
            class="canvas-frame"
            width="880"
            height="640"
            aria-label="Fractal tree drawing"
          ></canvas>
        </section>

        <aside class="card p-5" aria-label="Controls">
          <div id="controls"><!-- Control panel is rendered by ControlsView --></div>
        </aside>
      </div>
    </main>

    <footer class="text-faint mx-auto max-w-6xl px-4 pb-10 pt-4 text-center text-xs sm:px-6">
      <span data-i18n="footer.text">Built with a single recursive rule · Open source on</span>
      <a href="https://github.com/roanboc/fractal-tree-generator" class="footer-link">GitHub</a>
    </footer>

    <script type="module" src="/src/adapters/web/main.ts"></script>
  </body>
</html>
